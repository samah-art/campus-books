<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PAGE CONNEXION</title>
        <link rel="stylesheet" href="../style/formulaire.css">
    </head>
    <body>
        <h1>Connexion</h1>
        <div class="centre">
            <form action="" method="post">
                <p>Connexion a votre compte</p>
                <fieldset>
                    <legend>Email:</legend>
                    <input type="email" id="email" name="email" placeholder="exemple@gmail.com"> 
                </fieldset>
                <fieldset>
                    <legend>Mot de passe:</legend>
                    <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
                </fieldset>
                <button type="submit">Se connecter</button>
            </form>
            <div class="messages">
                <p>Vous n'avez pas de compte? <a href="inscription.html" target="_blank">S'inscrire</a></p>
            </div>
        </div>
        <script src="../javascript/formulaire.js"></script>
    </body>

</html>
