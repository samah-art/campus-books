<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande</title>
    <link rel="stylesheet" href="../style/formulaire.css">
</head>
<body>

<h1>Finaliser la commande</h1>

<div class="centre">

    <fieldset>
        <legend>Adresse de livraison :</legend>
        <input type="text" id="adresse" name="adresse" placeholder="votre adresse">
    </fieldset>

    <fieldset>
        <legend>Mode de paiement :</legend>
        <select id="paiement" onchange="afficherCarte()">
        <option value="">-- Choisir --</option>
        <option value="cash">Paiement à la livraison</option>
        <option value="card">Carte bancaire</option>
    </select>
    </fieldset>

    <div id="carteSection" style="display:none;">
        <fieldset>
            <legend>Numéro de carte :</legend>
            <input type="text" id="numCarte" placeholder="1234 5678 9012 3456">
        </fieldset>

        <fieldset>
            <legend>Date d'expiration :</legend>
            <input type="month" id="exp">
        </fieldset>
        
        <fieldset>
            <legend>CVV ::</legend>
            <input type="text" id="cvv" placeholder="123">
        </fieldset>
    </div>

    <button onclick="confirmerCommande()">Confirmer la commande</button>

</div>

<script src="../javascript/commande.js"></script>

</body>
</html>
